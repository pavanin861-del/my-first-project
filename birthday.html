<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday!</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial;
            color: white;
            padding-top: 100px;
        }
        h1 {
            font-size: 50px;
        }
        .btn {
            background: white;
            color: pink;
            padding: 15px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

<h1>🎉 Happy Birthday Sarah! 🎂</h1>
<p>Wishing you love, happiness and success!</p>

<button class="btn" onclick="playMusic()">Click for Surprise 🎵</button>

<audio id="music" src="birthday.mp3"></audio>

<script>
function playMusic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
